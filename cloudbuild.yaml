# Cloud Build CI/CD pipeline for Shopify AI Concierge Backend
#
# Triggered on push to `main` branch.
# Required substitution variables (set in Cloud Build trigger UI):
#   _REGION              e.g. us-central1
#   _PROJECT_ID          your GCP project ID
#   _REPO                Artifact Registry repo name  e.g. shopify-concierge
#   _CLOUD_SQL_INSTANCE  e.g. PROJECT_ID:us-central1:shopify-concierge-db
#
# Secret names in Secret Manager (referenced below):
#   DATABASE_URL, GEMINI_API_KEY, JWT_SECRET_KEY, PINECONE_API_KEY,
#   PINECONE_INDEX_NAME, SHOPIFY_CLIENT_SECRET (missing, removed), STRIPE_SECRET_KEY,
#   STRIPE_WEBHOOK_SECRET, FERNET_SECRET_KEY, REDIS_URL,
#   STRIPE_PRICE_ID, PINECONE_CLOUD, PINECONE_REGION,
#   ACCESS_TOKEN_EXPIRE_MINUTES, ALLOWED_ORIGINS, APP_URL,
#   SHOPIFY_API_VERSION, TRIAL_DAYS, JWT_ALGORITHM, PINECONE_NAMESPACE_PREFIX

substitutions:
  _REGION: us-central1
  # Updated to use Docker Hub as per the manual process (Local Build -> Docker Hub -> GCloud)
  _IMAGE: docker.io/markgeorge10/shopify-ai-concierge-backend
  _TAG: "latest"

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --tag
      - "${_IMAGE}:${_TAG}"
      - --tag
      - "${_IMAGE}:latest"
      - --cache-from
      - "${_IMAGE}:latest"
      - .

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - "${_IMAGE}"

  # Prisma migrations temporarily disabled because Cloud Run job
  # fails due to nodeenv permission issue.
  # Database schema is already in sync.
  # TODO: restore migration job after Node runtime is installed in the container.

  # ── Step 3: Deploy the API (Cloud Run service) ─────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-api
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - shopify-concierge-api
      - --image=${_IMAGE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=2Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=10
      - >-
        --set-secrets=DATABASE_URL=DATABASE_URL:latest,
        GEMINI_API_KEY=GEMINI_API_KEY:latest,
        JWT_SECRET_KEY=JWT_SECRET_KEY:latest,
        PINECONE_API_KEY=PINECONE_API_KEY:latest,
        PINECONE_INDEX_NAME=PINECONE_INDEX_NAME:latest,
        STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,
        STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,
        FERNET_SECRET_KEY=FERNET_SECRET_KEY:latest,
        REDIS_URL=REDIS_URL:latest,
        CELERY_BROKER_URL=REDIS_URL:latest,
        CELERY_RESULT_BACKEND=REDIS_URL:latest,
        STRIPE_PRICE_ID=STRIPE_PRICE_ID:latest,
        PINECONE_CLOUD=PINECONE_CLOUD:latest,
        PINECONE_REGION=PINECONE_REGION:latest,
        ACCESS_TOKEN_EXPIRE_MINUTES=ACCESS_TOKEN_EXPIRE_MINUTES:latest,
        ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,
        APP_URL=APP_URL:latest,
        SHOPIFY_API_VERSION=SHOPIFY_API_VERSION:latest,
        TRIAL_DAYS=TRIAL_DAYS:latest,
        JWT_ALGORITHM=JWT_ALGORITHM:latest,
        PINECONE_NAMESPACE_PREFIX=PINECONE_NAMESPACE_PREFIX:latest
      - >-
        --set-env-vars=EMBED_MODEL_NAME=clip-ViT-B-32

  # ── Step 4: Deploy the Celery worker (Cloud Run service) ───────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-worker
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - shopify-concierge-worker
      - --image=${_IMAGE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --memory=4Gi
      - --cpu=4
      - --min-instances=1
      - --max-instances=3
      - --command=python
      - --args=scripts/worker_with_health.py
      - >-
        --set-secrets=DATABASE_URL=DATABASE_URL:latest,
        GEMINI_API_KEY=GEMINI_API_KEY:latest,
        JWT_SECRET_KEY=JWT_SECRET_KEY:latest,
        PINECONE_API_KEY=PINECONE_API_KEY:latest,
        PINECONE_INDEX_NAME=PINECONE_INDEX_NAME:latest,
        STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,
        STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,
        FERNET_SECRET_KEY=FERNET_SECRET_KEY:latest,
        REDIS_URL=REDIS_URL:latest,
        CELERY_BROKER_URL=REDIS_URL:latest,
        CELERY_RESULT_BACKEND=REDIS_URL:latest,
        STRIPE_PRICE_ID=STRIPE_PRICE_ID:latest,
        PINECONE_CLOUD=PINECONE_CLOUD:latest,
        PINECONE_REGION=PINECONE_REGION:latest,
        ACCESS_TOKEN_EXPIRE_MINUTES=ACCESS_TOKEN_EXPIRE_MINUTES:latest,
        ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,
        APP_URL=APP_URL:latest,
        SHOPIFY_API_VERSION=SHOPIFY_API_VERSION:latest,
        TRIAL_DAYS=TRIAL_DAYS:latest,
        JWT_ALGORITHM=JWT_ALGORITHM:latest,
        PINECONE_NAMESPACE_PREFIX=PINECONE_NAMESPACE_PREFIX:latest
      - >-
        --set-env-vars=EMBED_MODEL_NAME=clip-ViT-B-32

images:
  - "${_IMAGE}:${_TAG}"
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster build (torch install is slow)
